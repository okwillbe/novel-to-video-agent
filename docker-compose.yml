services:
  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    container_name: novel2video-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: novel2video123
      MYSQL_DATABASE: novel2video
      MYSQL_ROOT_HOST: "%"
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    command:
      - "--default-authentication-plugin=mysql_native_password"
      - "--sql_mode=STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -pnovel2video123"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: novel2video-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s

  # ==================== MinIO ====================
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: novel2video-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  # ==================== App (Spring Boot) ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novel2video-app
    restart: unless-stopped
    environment:
      # Database
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: novel2video
      DB_USER: root
      DB_PASSWORD: novel2video123
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # MinIO
      STORAGE_TYPE: minio
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_BUCKET: novel2video
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      # JWT
      JWT_SECRET: novel2video-default-secret-key-2026
      # Billing
      BILLING_MODE: "OFF"
    ports:
      - "18080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  minio_data:
